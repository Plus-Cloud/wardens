<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wardens of the Forest</title>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide-static@0.321.0/lib/lucide.min.js"></script>

    <style>
      body { margin: 0; padding: 0; background: #050805; color: white; font-family: sans-serif; overflow: hidden; }
      #root { width: 100vw; height: 100vh; }
      .hud-glass { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
      /* The .text-wood, .text-gold etc classes from your App go here */
      .text-wood { color: #8b5e3c; } .text-gold { color: #fbbf24; } .text-hp { color: #f87171; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-presets="typescript,react">
      // 2. SETUP LIBRARIES (Since we can't use 'import')
      const { useState, useEffect, useRef } = React;
      const { motion, AnimatePresence } = window.Motion || { motion: (p) => <div {...p}/>, AnimatePresence: (p) => p.children };

      // Helper for Lucide Icons
      const LucideIcon = ({ name, className }) => {
        return <i data-lucide={name} className={className}></i>;
      };

      // 3. --- PASTE CONSTANTS & ENGINE CODE HERE ---
      // (Copy from your src/game/constants.ts and src/game/engine.ts)

      // 4. --- THE APP COMPONENT ---
      function App() {
        // PASTE YOUR APP CODE HERE (Starting from the hooks)
        // IMPORTANT: Replace all icon tags like <Play /> with <LucideIcon name="play" />
        
        return (
          <div className="relative w-full h-screen bg-[#050805] overflow-hidden">
             <h1>Wardens of the Forest</h1>
             <canvas id="game-canvas"></canvas>
          </div>
        );
      }

      // 5. LAUNCH
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
      
      // Initialize icons
      setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 500);
    </script>
  </body>
</html>
